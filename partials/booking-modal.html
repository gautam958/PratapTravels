<!-- Floating Book Now Button -->
<button class="floating-book-btn" id="floatingBookBtn" aria-label="Book Your Ride">
  🚗 <span>Book Now</span>
</button>

<!-- Booking Modal -->
<div class="booking-modal-overlay hidden" id="bookingModal">
  <div class="booking-modal">
    <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    <div class="modal-header">
      <h2>🚗 Book Your Ride</h2>
      <p>Fill out the form and we'll confirm shortly</p>
    </div>
    <div class="modal-body">
      <form class="booking-form" id="bookingForm" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="bookName">Full Name *</label>
            <input type="text" id="bookName" name="name" placeholder="Enter your full name" required>
            <span class="form-error" id="nameError" role="alert" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="bookPhone">Phone Number *</label>
            <input type="tel" id="bookPhone" name="phone" placeholder="e.g. 9876543210" required>
            <span class="form-error" id="phoneError" role="alert" aria-live="polite"></span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="bookEmail">Email Address</label>
            <input type="email" id="bookEmail" name="email" placeholder="e.g. you@example.com">
            <span class="form-error" id="emailError" role="alert" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="bookRoute">Route *</label>
            <select id="bookRoute" name="route" required>
              <option value="" disabled selected>Select your destination</option>
              <option value="Basukinath">Deoghar → Basukinath</option>
              <option value="Tarapith">Deoghar → Tarapith</option>
              <option value="Sultanganj">Deoghar → Sultanganj</option>
              <option value="Ranchi">Deoghar → Ranchi</option>
              <option value="Patna">Deoghar → Patna</option>
              <option value="Kolkata">Deoghar → Kolkata</option>
              <option value="Dumka">Deoghar → Dumka</option>
              <option value="Dhanbad">Deoghar → Dhanbad</option>
              <option value="Munger">Deoghar → Munger</option>
              <option value="Muzaffarpur">Deoghar → Muzaffarpur</option>
              <option value="AIIMS Deoghar">Deoghar → AIIMS</option>
              <option value="Waterpark">Deoghar Waterpark</option>
              <option value="Other">Other (mention in remarks)</option>
            </select>
            <span class="form-error" id="routeError" role="alert" aria-live="polite"></span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="bookDate">Travel Date *</label>
            <input type="date" id="bookDate" name="date" required>
            <span class="form-error" id="dateError" role="alert" aria-live="polite"></span>
          </div>
          <div class="form-group">
            <label for="bookTime">Preferred Time</label>
            <input type="time" id="bookTime" name="time">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="bookPassengers">No. of Passengers</label>
            <select id="bookPassengers" name="passengers">
              <option value="1">1 Passenger</option>
              <option value="2">2 Passengers</option>
              <option value="3">3 Passengers</option>
              <option value="4" selected>4 Passengers</option>
              <option value="5">5 Passengers</option>
              <option value="6">6 Passengers</option>
              <option value="7">7 Passengers</option>
            </select>
          </div>
          <div class="form-group">
            <label for="bookType">Trip Type *</label>
            <select id="bookType" name="type" required>
              <option value="" disabled selected>Select trip type</option>
              <option value="one-way">One Way</option>
              <option value="round-trip">Round Trip</option>
              <option value="full-day">Full Day / Multi-day</option>
              <option value="rental">Vehicle Rental</option>
            </select>
            <span class="form-error" id="typeError" role="alert" aria-live="polite"></span>
          </div>
        </div>
        <div class="form-group form-full">
          <label for="bookRemarks">Special Requests / Remarks</label>
          <textarea id="bookRemarks" name="remarks" rows="3" placeholder="Any special requirements... (airport pickup, multiple stops, etc.)"></textarea>
        </div>
        <div class="form-submit">
          <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">🚗 Submit Booking Request</button>
          <p class="form-note">We'll confirm your booking via WhatsApp or phone within 30 minutes.</p>
        </div>
      </form>
      <div class="booking-success hidden" id="bookingSuccess">
        <div class="success-icon">✅</div>
        <h3>Booking Request Sent!</h3>
        <p>We've received your booking request. We'll contact you shortly to confirm.</p>
        <button class="btn btn-secondary" onclick="resetBookingForm()">Book Another Ride</button>
      </div>
    </div>
  </div>
</div>
